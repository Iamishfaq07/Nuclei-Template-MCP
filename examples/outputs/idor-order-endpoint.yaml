# Illustrative example output for:
#   mcp-nuclei generate \
#     --request examples/requests/idor-order-endpoint.req \
#     --response examples/requests/idor-order-endpoint.resp \
#     --description "IDOR in order endpoint - low-priv user can read other customers' orders"
#
# This file shows the *shape and quality bar* mcp-nuclei aims for; it was
# authored by hand as a reference, not generated by a live MCP call, since
# this repository does not ship API credentials.

id: shop-example-orders-idor

info:
  name: Shop Example - Insecure Direct Object Reference on Order Detail Endpoint
  author: mcp-nuclei
  severity: high
  description: >
    The /api/v1/orders/{id} endpoint returns full order details, including
    another customer's email address and shipping address, to a caller
    authenticated as a different, unrelated account. This confirms a broken
    object-level authorization (IDOR) vulnerability allowing enumeration of
    other customers' order data.
  tags: idor,bac,authorization,shop-example
  reference:
    - https://owasp.org/www-project-top-ten/2017/A5_2017-Broken_Access_Control

http:
  - method: GET
    path:
      - "{{BaseURL}}/api/v1/orders/{{order_id}}"
    headers:
      Authorization: "Bearer {{auth_token}}"
      Accept: application/json

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200
      - type: word
        part: body
        words:
          - '"customer_id"'
          - '"customer_email"'
        condition: and
      - type: word
        part: header
        words:
          - "application/json"
        negative: false

    extractors:
      - type: json
        name: leaked_customer_email
        part: body
        json:
          - ".customer_email"
        internal: true

variables:
  order_id: "2001"
  auth_token: "low-priv-user-1042-token"
